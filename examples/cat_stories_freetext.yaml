project:
  name: "cat_stories_freetext"
  output_dir: "runs/cat_stories_freetext"
  seed: 42

description: "Short stories about cats, varied by tone, setting, audience, and emotional arc."

schema: null

# Fake models run fully offline (no API key needed). base_url is unused in fake mode.
provider:
  base_url: "fake"

models:
  strategic:
    model: "fake"
  bulk:
    model: "fake"
  critic:
    model: "fake"

taxonomy:
  depth: 2
  best_of_n: 2
  review_mode: "auto_accept"
  children_per_node: 2

generation:
  target_size: 5
  overgenerate_ratio: 1.4
  scenarios_per_mix: 2
  complexity_ratio: 0.2
  max_refine_attempts: 1
  concurrency: 2

evaluation:
  dedupe: true
  coverage: true
  coverage_mode: "lineage"
  complexity: false
  diversity:
    enabled: false
